<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wastd Hours - Player Library</title>
    <style>
        :root {
            --bg-main: #0a0a0c;
            --bg-surface: #15151a;
            --bg-card: #1c1c24;
            --text-main: #f0f0f5;
            --text-muted: #8f8f9d;
            --accent: #e50914;
            --accent-hover: #ff1f2a;
            --border: #2a2a35;
            
            --c-plat: #00d26a;
            --c-playing: #00a8ff;
            --c-next: #fbc531;
            --c-backlog: #7f8fa6;
        }

        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-main); color: var(--text-main); }

        /* Header y Navegación */
        header { background: var(--bg-surface); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .brand { font-size: 1.5rem; font-weight: 900; letter-spacing: 2px; }
        .brand span { color: var(--accent); }
        
        nav { display: flex; gap: 20px; }
        nav button { background: none; border: none; color: var(--text-muted); font-size: 1rem; font-weight: bold; cursor: pointer; padding: 5px 10px; transition: color 0.2s; }
        nav button:hover, nav button.active { color: var(--text-main); border-bottom: 2px solid var(--accent); }

        /* Buscador */
        .search-container { display: flex; gap: 10px; }
        .search-container input { padding: 8px 15px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg-main); color: white; outline: none; width: 250px; }
        .search-container button { background: var(--accent); color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }

        /* Cuadrícula Principal */
        main { padding: 30px; }
        .section-title { margin-top: 0; margin-bottom: 20px; font-size: 1.8rem; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }

        /* Tarjetas de Juego */
        .card { background: var(--bg-card); border-radius: 8px; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; border: 1px solid var(--border); position: relative; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.5); border-color: #444; }
        
        .card-img { width: 100%; height: 300px; object-fit: cover; background: #222; }
        .card-info { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-info h3 { margin: 0 0 10px 0; font-size: 1.1rem; }
        
        /* Indicador de estado en la tarjeta */
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .status-platinums { background: var(--c-plat); }
        .status-playing { background: var(--c-playing); }
        .status-next { background: var(--c-next); }
        .status-backlog { background: var(--c-backlog); }

        /* Controles para resultados de búsqueda */
        .add-controls { margin-top: auto; display: flex; flex-direction: column; gap: 5px; }
        .add-controls select, .add-controls button { width: 100%; padding: 8px; border-radius: 4px; border: none; font-size: 0.85rem; }
        .add-controls select { background: #333; color: white; outline: none; }
        .add-controls button { background: #444; color: white; cursor: pointer; font-weight: bold; }
        .add-controls button:hover { background: var(--accent); }

        /* Modal Detalle / Editor de Ficha */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: var(--bg-surface); width: 100%; max-width: 900px; max-height: 90vh; border-radius: 12px; overflow: hidden; display: flex; border: 1px solid var(--border); position: relative; }
        .close-modal { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.5); border: none; color: white; font-size: 1.5rem; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; z-index: 10; }
        
        .modal-left { width: 35%; background-size: cover; background-position: center; position: relative; }
        .modal-right { width: 65%; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        
        .modal-right h2 { margin: 0; font-size: 2rem; }
        .platforms-list { font-size: 0.8rem; color: var(--text-muted); display: flex; gap: 5px; flex-wrap: wrap; }
        .platforms-list span { background: #2a2a35; padding: 3px 8px; border-radius: 4px; }
        
        .rawg-desc { font-size: 0.9rem; line-height: 1.5; color: #ccc; max-height: 150px; overflow-y: auto; padding-right: 10px; border-left: 2px solid var(--border); padding-left: 10px; }
        
        /* Formulario de usuario en el modal */
        .user-data-form { background: #1c1c24; padding: 20px; border-radius: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; border: 1px solid var(--border); }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group.full { grid-column: span 2; }
        .user-data-form label { font-size: 0.85rem; color: var(--text-muted); font-weight: bold; }
        .user-data-form input, .user-data-form select, .user-data-form textarea { background: #0a0a0c; border: 1px solid #333; color: white; padding: 10px; border-radius: 6px; outline: none; }
        .user-data-form textarea { resize: vertical; min-height: 60px; }
        
        .save-btn { grid-column: span 2; background: var(--c-playing); color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: background 0.2s;}
        .save-btn:hover { background: #0097e6; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
    </style>
</head>
<body>

    <header>
        <div class="brand">WASTD<span>HOURS</span></div>
        <nav id="main-nav">
            <button class="active" onclick="filterView('playing')">Jugando</button>
            <button onclick="filterView('next')">Siguientes</button>
            <button onclick="filterView('backlog')">Backlog</button>
            <button onclick="filterView('platinums')">Platinos</button>
        </nav>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Buscar nuevos juegos...">
            <button onclick="executeSearch()">Buscar</button>
        </div>
    </header>

    <main>
        <h2 id="current-section-title" class="section-title">Jugando Ahora</h2>
        <div class="grid" id="main-grid">
            <!-- Juegos inyectados aquí -->
        </div>
    </main>

    <!-- Modal de Ficha de Juego -->
    <div class="modal-overlay" id="game-modal" onclick="if(event.target === this) closeModal()">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">×</button>
            <div class="modal-left" id="modal-image"></div>
            <div class="modal-right">
                <div>
                    <h2 id="modal-title">Título del Juego</h2>
                    <div class="platforms-list" id="modal-platforms"></div>
                </div>
                
                <div class="rawg-desc" id="modal-desc">Cargando sinopsis de RAWG...</div>
                
                <!-- Tu información personal -->
                <div class="user-data-form">
                    <div class="form-group">
                        <label>Estado en Biblioteca</label>
                        <select id="user-status">
                            <option value="playing">Jugando Ahora</option>
                            <option value="next">Siguientes (Up Next)</option>
                            <option value="backlog">Backlog / Wishlist</option>
                            <option value="platinums">Platinados</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Plataforma Jugada</label>
                        <select id="user-platform">
                            <!-- Se llena dinámicamente según RAWG -->
                        </select>
                    </div>
                    <div class="form-group full">
                        <label>Nota Personal (1-10)</label>
                        <input type="number" id="user-rating" min="1" max="10" placeholder="Ej: 9">
                    </div>
                    <div class="form-group full">
                        <label>Mi Reseña / Notas</label>
                        <textarea id="user-review" placeholder="Tus notas, opiniones, o enlaces a guías..."></textarea>
                    </div>
                    <button class="save-btn" onclick="saveGameData()">Guardar Cambios</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 🛑 TU API KEY DE RAWG 🛑
        const RAWG_API_KEY = 'd5859db1311f4748997d944eb3ab9772'; 

        // Tu Base de Datos Local (Simulada). La clave es el ID de RAWG.
        let myLibrary = {
            "28199": { id: "28199", title: "Cat Quest II", status: "playing", image: "https://media.rawg.io/media/games/6b8/6b8c1d51c3a63ec51b81ddc2bfebddde.jpg", rating: "", review: "Jugando en cooperativo.", platformPlayed: "PlayStation 4" },
            "2454": { id: "2454", title: "Final Fantasy III", status: "playing", image: "https://media.rawg.io/media/games/2a2/2a2e41103f56f1cc3ccb5774eddd5f72.jpg", rating: "", review: "Sacando el bestiario.", platformPlayed: "PC" },
            "58134": { id: "58134", title: "Bloodborne", status: "platinums", image: "https://media.rawg.io/media/games/214/214b29aeff13a0ae6a70fc4426e85991.jpg", rating: 10, review: "Obra maestra.", platformPlayed: "PlayStation 4" }
        };

        let currentView = 'playing';
        let currentModalGameId = null; // Guarda el ID del juego que estamos editando

        const statusTitles = { 'playing': 'Jugando Ahora', 'next': 'Siguientes', 'backlog': 'Backlog', 'platinums': 'Platinos' };

        // --- RENDERIZADO DE BIBLIOTECA ---
        function filterView(status) {
            currentView = status;
            
            // Actualizar UI del Menú
            document.querySelectorAll('#main-nav button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('current-section-title').innerText = statusTitles[status];
            
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';

            // Filtrar y renderizar
            Object.values(myLibrary).forEach(game => {
                if (game.status === status) {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => openGameModal(game.id, game.title);
                    card.innerHTML = `
                        <img src="${game.image}" class="card-img" alt="${game.title}">
                        <div class="card-info">
                            <h3><span class="status-dot status-${game.status}"></span>${game.title}</h3>
                            <span style="font-size:0.8rem; color:#888;">${game.platformPlayed || 'Sin plataforma'} ${game.rating ? '| Nota: ' + game.rating : ''}</span>
                        </div>
                    `;
                    grid.appendChild(card);
                }
            });

            if(grid.innerHTML === '') grid.innerHTML = '<p style="color:#888;">No hay juegos en esta lista.</p>';
        }

        // --- BUSCADOR API RAWG ---
        async function executeSearch() {
            const query = document.getElementById('search-input').value;
            if (!query) return;

            document.querySelectorAll('#main-nav button').forEach(btn => btn.classList.remove('active'));
            document.getElementById('current-section-title').innerText = `Resultados para: "${query}"`;
            
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '<p>Buscando en la base de datos de RAWG...</p>';

            try {
                const res = await fetch(`https://api.rawg.io/api/games?search=${encodeURIComponent(query)}&key=${RAWG_API_KEY}&page_size=12`);
                const data = await res.json();
                grid.innerHTML = '';

                data.results.forEach(game => {
                    const isOwned = myLibrary[game.id] !== undefined;
                    
                    const card = document.createElement('div');
                    card.className = 'card';
                    // Si ya lo tenemos, abrir modal. Si no, no hacemos el card clickeable entero para no interferir con los botones de añadir
                    if(isOwned) {
                        card.style.border = "2px solid var(--accent)";
                        card.onclick = (e) => { if(e.target.tagName !== 'BUTTON' && e.target.tagName !== 'SELECT') openGameModal(game.id, game.name); };
                    }

                    card.innerHTML = `
                        <img src="${game.background_image || 'https://via.placeholder.com/300x400?text=No+Image'}" class="card-img">
                        <div class="card-info">
                            <h3>${game.name}</h3>
                            ${isOwned ? `<p style="color:var(--c-playing); font-size:0.8rem; font-weight:bold;">✓ Ya en biblioteca</p>` : `
                                <div class="add-controls">
                                    <select id="quick-status-${game.id}">
                                        <option value="backlog">Añadir a Backlog</option>
                                        <option value="next">Añadir a Siguientes</option>
                                        <option value="playing">Añadir a Jugando</option>
                                        <option value="platinums">Añadir a Platinos</option>
                                    </select>
                                    <button onclick="quickAddGame('${game.id}', '${game.name.replace(/'/g, "\\'")}', '${game.background_image}')">Guardar Juego</button>
                                </div>
                            `}
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                grid.innerHTML = '<p>Error conectando con RAWG. ¿Has puesto tu API Key?</p>';
            }
        }

        // Función rápida para añadir desde la búsqueda
        function quickAddGame(id, title, image) {
            const status = document.getElementById(`quick-status-${id}`).value;
            myLibrary[id] = { id: id, title: title, status: status, image: image, rating: "", review: "", platformPlayed: "" };
            alert(`${title} añadido a tu biblioteca.`);
            executeSearch(); // Refresca la vista de búsqueda
        }

        // --- MODAL DE EDICIÓN Y DETALLES ---
        async function openGameModal(gameId, gameTitle) {
            currentModalGameId = gameId;
            const gameData = myLibrary[gameId];
            
            document.getElementById('game-modal').style.display = 'flex';
            document.getElementById('modal-title').innerText = gameTitle;
            document.getElementById('modal-image').style.backgroundImage = `url('${gameData.image}')`;
            document.getElementById('modal-desc').innerHTML = "Buscando detalles...";
            document.getElementById('modal-platforms').innerHTML = "";

            // Llenar formulario de usuario con los datos locales
            document.getElementById('user-status').value = gameData.status;
            document.getElementById('user-rating').value = gameData.rating || '';
            document.getElementById('user-review').value = gameData.review || '';

            // Obtener info profunda de RAWG
            try {
                const res = await fetch(`https://api.rawg.io/api/games/${gameId}?key=${RAWG_API_KEY}`);
                const details = await res.json();
                
                document.getElementById('modal-desc').innerHTML = details.description || "Sin descripción oficial.";
                
                // Generar lista visual de plataformas y rellenar el selector de usuario
                const platformSelector = document.getElementById('user-platform');
                platformSelector.innerHTML = '<option value="">Selecciona tu plataforma...</option>';
                
                if (details.platforms) {
                    details.platforms.forEach(p => {
                        // Chips visuales
                        document.getElementById('modal-platforms').innerHTML += `<span>${p.platform.name}</span>`;
                        // Opciones del selector
                        const isSelected = gameData.platformPlayed === p.platform.name ? 'selected' : '';
                        platformSelector.innerHTML += `<option value="${p.platform.name}" ${isSelected}>${p.platform.name}</option>`;
                    });
                }
            } catch (error) {
                document.getElementById('modal-desc').innerHTML = "No se pudieron cargar los detalles adicionales.";
            }
        }

        function closeModal() {
            document.getElementById('game-modal').style.display = 'none';
        }

        // Guardar cambios desde el Modal a la Base de Datos Local
        function saveGameData() {
            if(!currentModalGameId) return;

            myLibrary[currentModalGameId].status = document.getElementById('user-status').value;
            myLibrary[currentModalGameId].platformPlayed = document.getElementById('user-platform').value;
            myLibrary[currentModalGameId].rating = document.getElementById('user-rating').value;
            myLibrary[currentModalGameId].review = document.getElementById('user-review').value;

            closeModal();
            
            // Si el usuario estaba viendo la categoría "jugando", forzamos un refresco de esa vista
            if(document.querySelector(`#main-nav button:contains('${statusTitles[currentView]}')`)) {
                 filterView(currentView);
            } else {
                 filterView(currentView); // Actualizar vista actual
            }
        }

        // Helper para emular pseudo-selector :contains (simplificado)
        // Inicializar
        document.querySelector('#main-nav button').click(); // Simula click en la primera pestaña

    </script>
</body>
</html>
