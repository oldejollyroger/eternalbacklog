<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eternal Backlog | Player Hub</title>
    <style>
        :root {
            --bg-body: #050505;
            --bg-surface: #111111;
            --bg-card: #1a1a1a;
            --accent: #ff4d4d;
            --accent-glow: rgba(255, 77, 77, 0.4);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* --- NAVEGACIÓN MODERNA --- */
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 50px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
            box-sizing: border-box;
            backdrop-filter: blur(10px);
        }

        .logo { font-size: 1.5rem; font-weight: 800; letter-spacing: -1px; text-transform: uppercase; }
        .logo span { color: var(--accent); }

        .nav-links { display: flex; gap: 30px; }
        .nav-links button {
            background: none; border: none; color: var(--text-dim);
            font-weight: 600; cursor: pointer; transition: 0.3s;
            font-size: 0.9rem; position: relative;
        }
        .nav-links button.active, .nav-links button:hover { color: var(--text-main); }
        .nav-links button.active::after {
            content: ''; position: absolute; bottom: -8px; left: 0; width: 100%; height: 2px; background: var(--accent);
        }

        .search-box { position: relative; }
        .search-box input {
            background: var(--glass); border: 1px solid var(--border);
            padding: 10px 20px; border-radius: 30px; color: white; outline: none; width: 200px;
            transition: 0.3s;
        }
        .search-box input:focus { width: 300px; border-color: var(--accent); }

        /* --- GRID DE JUEGOS (NETFLIX STYLE) --- */
        main { padding: 120px 50px 50px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 30px;
        }

        .card {
            position: relative;
            aspect-ratio: 2/3;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid var(--border);
        }

        .card:hover { transform: scale(1.05); border-color: var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 10%, transparent 60%);
            display: flex; flex-direction: column; justify-content: flex-end; padding: 15px;
            opacity: 0.9;
        }
        .card-overlay h3 { margin: 0; font-size: 1rem; font-weight: 700; }
        .card-overlay p { margin: 5px 0 0; font-size: 0.75rem; color: var(--text-dim); }

        /* --- PÁGINA DE DETALLE (FULL OVERLAY) --- */
        .game-detail-page {
            position: fixed; inset: 0; background: var(--bg-body); z-index: 2000;
            display: none; overflow-y: auto;
        }

        .hero-banner {
            width: 100%; height: 50vh; background-size: cover; background-position: center;
            position: relative;
        }

        .hero-banner::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to top, var(--bg-body), transparent);
        }

        .detail-content { padding: 0 50px 50px; margin-top: -150px; position: relative; z-index: 5; }
        .detail-header { display: flex; gap: 40px; align-items: flex-end; margin-bottom: 40px; }
        .detail-poster { width: 250px; border-radius: 15px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); border: 1px solid var(--border); }
        
        .detail-info h1 { font-size: 3.5rem; margin: 0; letter-spacing: -2px; }
        
        .detail-tabs { display: flex; gap: 40px; border-bottom: 1px solid var(--border); margin-bottom: 30px; }
        .tab-btn {
            background: none; border: none; color: var(--text-dim);
            padding: 15px 0; cursor: pointer; font-weight: 700; text-transform: uppercase; font-size: 0.8rem;
        }
        .tab-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Estilos específicos para la pestaña de trofeos */
        .trophy-list { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .trophy-item {
            background: var(--bg-surface); padding: 15px; border-radius: 10px;
            display: flex; align-items: center; gap: 15px; border: 1px solid var(--border);
        }
        .trophy-icon { width: 40px; height: 40px; border-radius: 50%; background: #222; }
        .trophy-warn { color: #ffa502; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; border: 1px solid #ffa502; padding: 2px 5px; border-radius: 4px; }

        .close-detail {
            position: fixed; top: 30px; right: 50px; z-index: 3000;
            background: var(--accent); color: white; border: none; padding: 10px 20px;
            border-radius: 30px; font-weight: 800; cursor: pointer;
        }

        .user-notes-section {
            background: var(--bg-surface); padding: 25px; border-radius: 15px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
        }
        
        textarea {
            width: 100%; background: var(--bg-body); border: 1px solid var(--border);
            color: white; padding: 15px; border-radius: 8px; font-family: inherit;
        }

    </style>
</head>
<body>

    <nav>
        <div class="logo">Eternal<span>Backlog</span></div>
        <div class="nav-links">
            <button class="active" onclick="changeView('playing', event)">Playing</button>
            <button onclick="changeView('next', event)">Next Up</button>
            <button onclick="changeView('backlog', event)">Vault</button>
            <button onclick="changeView('platinums', event)">Platted</button>
        </div>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Find a game..." onkeypress="if(event.key === 'Enter') startSearch()">
        </div>
    </nav>

    <main>
        <div class="grid" id="game-grid">
            <!-- Cargando... -->
        </div>
    </main>

    <!-- PÁGINA DE DETALLE (Inyectada dinámicamente) -->
    <div class="game-detail-page" id="game-detail">
        <button class="close-detail" onclick="closeDetailPage()">BACK TO HUB</button>
        <div id="detail-data">
            <!-- Aquí se inyecta todo -->
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        // BASE DE DATOS LOCAL
        let myLibrary = {
            "28199": { id: "28199", title: "Cat Quest II", status: "playing", rating: 8, notes: "Bestiary in progress", platform: "PS5", missables: true },
            "58134": { id: "58134", title: "Bloodborne", status: "platinums", rating: 10, notes: "Masterpiece", platform: "PS4", missables: false }
        };

        let currentView = 'playing';

        // --- FUNCIONES DE NAVEGACIÓN ---
        function changeView(status, event) {
            currentView = status;
            document.querySelectorAll('.nav-links button').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderGrid();
        }

        async function renderGrid() {
            const grid = document.getElementById('game-grid');
            grid.innerHTML = '<p>Accessing the vault...</p>';
            
            const games = Object.values(myLibrary).filter(g => g.status === currentView);
            grid.innerHTML = '';

            for (let game of games) {
                // Obtenemos imagen real de RAWG si no la tenemos
                const img = await getGameImage(game.id);
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openDetailPage(game.id);
                card.innerHTML = `
                    <img src="${img}" alt="${game.title}">
                    <div class="card-overlay">
                        <h3>${game.title}</h3>
                        <p>${game.platform || 'Multi'}</p>
                    </div>
                `;
                grid.appendChild(card);
            }
        }

        async function getGameImage(id) {
            try {
                const res = await fetch(`https://api.rawg.io/api/games/${id}?key=${config.RAWG_API_KEY}`);
                const data = await res.json();
                return data.background_image;
            } catch { return 'https://via.placeholder.com/200x300'; }
        }

        // --- PÁGINA DE DETALLE ---
        async function openDetailPage(gameId) {
            const detailPage = document.getElementById('game-detail');
            const container = document.getElementById('detail-data');
            const localData = myLibrary[gameId];
            
            detailPage.style.display = 'block';
            document.body.style.overflow = 'hidden';

            // Fetch profundo de RAWG
            const res = await fetch(`https://api.rawg.io/api/games/${gameId}?key=${config.RAWG_API_KEY}`);
            const api = await res.json();

            container.innerHTML = `
                <div class="hero-banner" style="background-image: url('${api.background_image_additional || api.background_image}')"></div>
                <div class="detail-content">
                    <div class="detail-header">
                        <img src="${api.background_image}" class="detail-poster">
                        <div class="detail-info">
                            <h1>${api.name}</h1>
                            <p style="color: var(--accent); font-weight: 800;">${api.released} | Metacritic: ${api.metacritic || 'N/A'}</p>
                        </div>
                    </div>

                    <div class="detail-tabs">
                        <button class="tab-btn active" onclick="switchTab('tab-general', event)">Overview</button>
                        <button class="tab-btn" onclick="switchTab('tab-trophies', event)">Trophies & Guides</button>
                        <button class="tab-btn" onclick="switchTab('tab-user', event)">My Journey</button>
                    </div>

                    <div id="tab-general" class="tab-content active">
                        <div style="max-width: 800px; line-height: 1.8; color: var(--text-dim);">
                            ${api.description}
                        </div>
                    </div>

                    <div id="tab-trophies" class="tab-content">
                        <div class="trophy-list">
                            <div class="trophy-item">
                                <div class="trophy-icon"></div>
                                <div>
                                    <div style="font-weight:bold">Platimum Trophy Hunter</div>
                                    <div style="font-size:0.8rem; color:var(--text-dim)">Total achievements: ${api.achievements_count || 'Check store'}</div>
                                </div>
                            </div>
                            <div class="trophy-item" style="border-color: #ffa502">
                                <span class="trophy-warn">Missable Alert</span>
                                <div>
                                    <div style="font-weight:bold">¿Trofeos perdibles?</div>
                                    <div style="font-size:0.8rem; color:var(--text-dim)">${localData.missables ? 'SÍ. Consulta una guía antes de avanzar.' : 'No se han reportado.'}</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="tab-user" class="tab-content">
                        <div class="user-notes-section">
                            <div>
                                <label>Status</label><br>
                                <select id="edit-status" style="width:100%; padding:10px; margin: 10px 0; background:#000; color:white; border:1px solid var(--border)">
                                    <option value="playing" ${localData.status === 'playing' ? 'selected' : ''}>Playing</option>
                                    <option value="next" ${localData.status === 'next' ? 'selected' : ''}>Next Up</option>
                                    <option value="backlog" ${localData.status === 'backlog' ? 'selected' : ''}>Vault</option>
                                    <option value="platinums" ${localData.status === 'platinums' ? 'selected' : ''}>Platted</option>
                                </select>
                                <label>My Rating</label><br>
                                <input type="number" id="edit-rating" value="${localData.rating}" style="width:100%; padding:10px; margin: 10px 0; background:#000; color:white; border:1px solid var(--border)">
                            </div>
                            <div>
                                <label>Personal Notes & Log</label><br>
                                <textarea id="edit-notes" rows="6">${localData.notes}</textarea>
                            </div>
                            <button onclick="saveChanges('${gameId}')" style="grid-column: span 2; padding: 15px; background: var(--accent); color:white; border:none; border-radius: 8px; font-weight:bold; cursor:pointer;">SAVE UPDATES</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function switchTab(tabId, event) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }

        function closeDetailPage() {
            document.getElementById('game-detail').style.display = 'none';
            document.body.style.overflow = 'auto';
            renderGrid();
        }

        function saveChanges(gameId) {
            myLibrary[gameId].status = document.getElementById('edit-status').value;
            myLibrary[gameId].rating = document.getElementById('edit-rating').value;
            myLibrary[gameId].notes = document.getElementById('edit-notes').value;
            alert('Journal updated.');
        }

        // --- BUSCADOR ---
        async function startSearch() {
            const q = document.getElementById('search-input').value;
            const grid = document.getElementById('game-grid');
            grid.innerHTML = '<p>Scanning the multiverse...</p>';
            
            const res = await fetch(`https://api.rawg.io/api/games?search=${q}&key=${config.RAWG_API_KEY}&page_size=20`);
            const data = await res.json();
            
            grid.innerHTML = '';
            data.results.forEach(game => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => {
                    if(!myLibrary[game.id]) {
                        myLibrary[game.id] = { id: game.id, title: game.name, status: 'backlog', notes: '', rating: '', platform: game.platforms[0]?.platform.name };
                    }
                    openDetailPage(game.id);
                };
                card.innerHTML = `
                    <img src="${game.background_image}" alt="${game.name}">
                    <div class="card-overlay"><h3>${game.name}</h3><p>Click to add/view</p></div>
                `;
                grid.appendChild(card);
            });
        }

        // Init
        renderGrid();
    </script>
</body>
</html>
