<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eternal Backlog - Game Tracker</title>
    <style>
        /* Mismos estilos base de antes, con ajustes para imágenes */
        :root { --bg-color: #121212; --surface-color: #1e1e1e; --primary-color: #bb86fc; --text-color: #e0e0e0; }
        body { margin: 0; font-family: sans-serif; background: var(--bg-color); color: var(--text-color); }
        .search-bar { text-align: center; margin: 20px; }
        .search-bar input { padding: 10px; width: 300px; border-radius: 4px; border: none; }
        .search-bar button { padding: 10px 20px; background: var(--primary-color); border: none; cursor: pointer; border-radius: 4px; font-weight: bold;}
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .game-card { background: var(--surface-color); border-radius: 8px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
        .game-card img { width: 100%; height: 250px; object-fit: cover; }
        .game-info { padding: 15px; }
        .game-info h3 { margin: 0 0 10px 0; font-size: 1.2rem; }
        .meta { font-size: 0.9rem; color: #aaa; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="search-bar">
        <h2>Buscar en RAWG</h2>
        <input type="text" id="searchInput" placeholder="Ej: Cat Quest 2, Final Fantasy...">
        <button onclick="searchGames()">Buscar</button>
    </div>

    <div class="game-grid" id="results-grid">
        <!-- Los resultados aparecerán aquí -->
    </div>

    <script>
        // Sustituye esto por tu API Key real de RAWG
        const RAWG_API_KEY = 'd5859db1311f4748997d944eb3ab9772'; 

        async function searchGames() {
            const query = document.getElementById('searchInput').value;
            if (!query) return;

            const grid = document.getElementById('results-grid');
            grid.innerHTML = '<p style="text-align:center; width:100%;">Buscando...</p>';

            try {
                const response = await fetch(`https://api.rawg.io/api/games?key=${RAWG_API_KEY}&search=${query}&page_size=8`);
                const data = await response.json();
                
                grid.innerHTML = '';
                
                data.results.forEach(game => {
                    const releaseYear = game.released ? game.released.split('-')[0] : 'N/A';
                    grid.innerHTML += `
                        <div class="game-card">
                            <img src="${game.background_image || 'https://via.placeholder.com/250x250?text=Sin+Imagen'}" alt="${game.name}">
                            <div class="game-info">
                                <h3>${game.name}</h3>
                                <div class="meta">Lanzamiento: ${releaseYear} <br> Nota: ${game.metacritic || '-'}</div>
                                <button style="padding: 5px 10px; cursor: pointer;">Añadir a Platinos</button>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Error al obtener datos:", error);
                grid.innerHTML = '<p>Error al conectar con RAWG.</p>';
            }
        }
    </script>
</body>
</html>
